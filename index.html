<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭点菜系统</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
<div id="app" class="app">
  <!-- 首页 -->
  <div id="page-home" class="page active">
    <div class="banner">
      <div class="banner-text">
        <h1 id="system-name">小恒家厨房</h1>
        <p>今天吃什么？</p>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍 搜索菜品" oninput="searchFood()">
    </div>
    <div class="category-tabs">
      <div class="tab active" onclick="switchTab(0)">主食</div>
      <div class="tab" onclick="switchTab(1)">热菜</div>
      <div class="tab" onclick="switchTab(2)">凉菜</div>
      <div class="tab" onclick="switchTab(3)">汤类</div>
      <div class="tab" onclick="switchTab(4)">饮料</div>
    </div>
    <div class="food-list" id="food-list"></div>
  </div>

  <!-- 菜品详情 -->
  <div id="page-detail" class="page">
    <div class="back" onclick="goPage('home')">← 返回</div>
    <div class="detail-image" id="detail-image"></div>
    <div class="detail-card">
      <h2 id="detail-name"></h2>
      <div class="detail-info">
        <span>⏱ 时间：<span id="detail-time"></span> 分钟</span>
        <span>📊 难度：<span id="detail-diff"></span></span>
      </div>
      <p id="detail-desc"></p>
    </div>
    <div class="detail-card">
      <h3>食材用料</h3>
      <div id="detail-ing"></div>
    </div>
    <div class="detail-card">
      <h3>制作步骤</h3>
      <div id="detail-steps"></div>
    </div>
    <div class="form-item">
      <label>📝 点菜备注</label>
      <input type="text" id="order-remark" placeholder="少辣、不要葱">
    </div>
    <div class="btn-group">
      <button class="btn primary" onclick="addMenu()">加入今日菜单</button>
    </div>
  </div>

  <!-- 我的菜单 -->
  <div id="page-menu" class="page">
    <div class="back" onclick="goPage('home')">← 返回</div>
    <h2 class="page-title">今日菜单</h2>
    <div id="menu-list"></div>
  </div>

  <!-- 我的 -->
  <div id="page-mine" class="page">
    <h2 class="page-title">我的</h2>
    <div class="menu-item" onclick="goPage('admin')">厨房管理后台</div>
  </div>

  <!-- 管理后台 -->
  <div id="page-admin" class="page">
    <div class="back" onclick="goPage('mine')">← 返回</div>
    <h2 class="page-title">厨房管理后台</h2>

    <div class="form-item">
      <label>🤖 AI 生成菜谱</label>
      <input type="text" id="ai-food-name" placeholder="输入菜名">
      <button class="btn primary" onclick="aiGenAll()">AI 一键生成</button>
    </div>

    <div class="form-item">
      <label>菜品名称</label>
      <input type="text" id="add-name">
    </div>
    <div class="form-item">
      <label>分类</label>
      <input type="text" id="add-cate">
    </div>
    <div class="form-item">
      <label>制作时间（分钟）</label>
      <input type="number" id="add-time">
    </div>
    <div class="form-item">
      <label>食材</label>
      <input type="text" id="add-ing">
    </div>
    <div class="form-item">
      <label>描述</label>
      <input type="text" id="add-desc">
    </div>

    <button class="btn primary" onclick="addCustomFood()">添加菜品</button>
  </div>

  <!-- 底部导航（修复版） -->
  <div class="tabbar">
    <div class="tab-item active" onclick="switchTabbar(0)">首页</div>
    <div class="tab-item" onclick="switchTabbar(1)">菜单</div>
    <div class="tab-item" onclick="switchTabbar(2)">我的</div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
