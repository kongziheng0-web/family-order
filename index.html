<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,user-scalable=no">
  <title>家庭点菜系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" class="app">
  <!-- 首页 -->
  <div id="page-home" class="page active">
    <div class="banner" id="banner">
      <div class="banner-overlay"></div>
      <div class="banner-text">
        <h1 id="system-name">小恒家厨房</h1>
        <p>今天吃什么？</p>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍 搜索菜品" oninput="searchFood()">
    </div>
    <div class="random-btn" onclick="randomFood()">🎲 随机推荐今晚吃什么</div>
    <div class="category-tabs">
      <div class="tab active" onclick="switchTab(0)">主食</div>
      <div class="tab" onclick="switchTab(1)">热菜</div>
      <div class="tab" onclick="switchTab(2)">凉菜</div>
      <div class="tab" onclick="switchTab(3)">汤类</div>
      <div class="tab" onclick="switchTab(4)">饮料</div>
    </div>
    <div class="food-list" id="food-list"></div>
  </div>
  <!-- 菜品详情 -->
  <div id="page-detail" class="page">
    <div class="back" onclick="goPage('home')">← 返回</div>
    <div class="detail-image" id="detail-image"></div>
    <div class="detail-card">
      <h2 id="detail-name"></h2>
      <div class="detail-info">
        <span>⏱ 时间：<span id="detail-time"></span> 分钟</span>
        <span>📊 难度：<span id="detail-diff"></span></span>
        <span>🔥 热量：<span id="detail-cal"></span></span>
      </div>
      <p id="detail-desc" class="detail-desc"></p>
    </div>
    <div class="detail-card">
      <h3>食材用料</h3>
      <div id="detail-ing"></div>
    </div>
    <div class="detail-card">
      <h3>制作步骤</h3>
      <div id="detail-steps"></div>
    </div>
    <div class="btn-group">
      <button class="btn primary" onclick="addMenu()">加入今日菜单</button>
      <button class="btn outline" onclick="changeCurrentFoodImage()">更换菜品图片</button>
      <button class="btn outline" onclick="showShopping()">生成买菜清单</button>
    </div>
  </div>
  <!-- 我的菜单 -->
  <div id="page-menu" class="page">
    <div class="back" onclick="goPage('home')">← 返回</div>
    <h2 class="page-title">今日菜单</h2>
    <div class="menu-btn-group">
      <button class="btn small" onclick="clearMenu()">清空菜单</button>
      <button class="btn small primary" onclick="cookOrder()">做饭顺序</button>
      <button class="btn small outline" onclick="showShopping()">买菜清单</button>
    </div>
    <div id="menu-list" class="menu-list"></div>
  </div>
  <!-- 我的页面 -->
  <div id="page-mine" class="page">
    <div class="user-card">
      <div class="avatar" id="avatar" onclick="changeAvatar()"></div>
      <h3 id="mine-name"></h3>
      <p>已收藏：<span id="collect-count">0</span> 个</p>
      <p>自定义菜品：<span id="custom-count">0</span> 个</p>
    </div>
    <div class="menu-item" onclick="goPage('setting')">系统设置</div>
    <div class="menu-item" onclick="goPage('admin')">厨房管理后台</div>
  </div>
  <!-- 设置 -->
  <div id="page-setting" class="page">
    <div class="back" onclick="goPage('mine')">← 返回</div>
    <h2 class="page-title">系统设置</h2>
    <div class="form-item">
      <label>系统名称</label>
      <input type="text" id="set-name" placeholder="例如：小恒家厨房">
    </div>
    <div class="form-item">
      <label>上传首页背景图</label>
      <button class="btn outline" onclick="changeBanner()">更换背景图</button>
    </div>
    <button class="btn primary" onclick="saveSetting()">保存设置</button>
  </div>
  <!-- 管理后台 -->
  <div id="page-admin" class="page">
    <div class="back" onclick="goPage('mine')">← 返回</div>
    <h2 class="page-title">厨房管理后台</h2>
    <div class="form-item">
      <label>🤖 AI 生成菜谱（输入菜名自动生成食材步骤）</label>
      <input type="text" id="ai-food-name" placeholder="例如：鱼香肉丝">
      <button class="btn primary" onclick="aiGenerateFood()" style="margin-top:8px;">AI 一键生成</button>
    </div>
    <div class="form-item">
      <label>菜品图片（选填）</label>
      <button class="btn outline" onclick="selectFoodImage()">上传菜品图片</button>
      <p id="food-image-tip" style="font-size:12px;color:#999;margin-top:4px;">未上传时会使用默认图片</p>
    </div>
    <div class="form-item">
      <label>菜品名称 *</label>
      <input type="text" id="add-name" placeholder="例如：排骨汤">
    </div>
    <div class="form-item">
      <label>分类 *（主食/热菜/凉菜/汤类/饮料）</label>
      <input type="text" id="add-cate" placeholder="例如：汤类">
    </div>
    <div class="form-item">
      <label>制作时间（分钟）*</label>
      <input type="number" id="add-time" placeholder="例如：90">
    </div>
    <div class="form-item">
      <label>食材（用逗号分隔）*</label>
      <input type="text" id="add-ing" placeholder="排骨500g,玉米1根,姜片3片">
    </div>
    <div class="form-item">
      <label>菜品描述（选填）</label>
      <input type="text" id="add-desc" placeholder="例如：营养又好喝的排骨汤">
    </div>
    <button class="btn primary" onclick="addCustomFood()">添加菜品</button>
  </div>
  <!-- 底部导航 -->
  <div class="tabbar">
    <div class="tab-item active" onclick="goPage('home')"><span>首页</span></div>
    <div class="tab-item" onclick="goPage('menu')"><span>菜单</span></div>
    <div class="tab-item" onclick="goPage('mine')"><span>我的</span></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="app.js"></script>
</body>
</html>
